name: Deploy Static Content to Pages

on:
  push:
    branches: ["main"] # Ganti master jika branch lu namanya master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build website
        run: npm run build # Memastikan perintah build berjalan (menghasilkan folder dist/build)
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # Ganti './build' jika lu pakai Create React App biasa, bukan Vite
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4